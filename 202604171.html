<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>分數比較 | 圖形分割練習</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #2b5e6b 0%, #1a404a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', '微軟正黑體', 'Noto Sans TC', 'Times New Roman', 'Georgia', serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            max-width: 1000px;
            width: 100%;
            background: #fef7e9;
            border-radius: 70px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.35), inset 0 1px 3px rgba(255, 255, 255, 0.7);
            overflow: hidden;
            padding: 30px 28px 40px;
            transition: all 0.2s ease;
        }

        /* 分數對決區 */
        .fraction-battle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin: 20px 0 20px;
            flex-wrap: wrap;
        }

        .fraction-card {
            flex: 1;
            min-width: 220px;
            background: linear-gradient(135deg, #ffffff, #fff9ef);
            border-radius: 60px;
            padding: 25px 15px;
            text-align: center;
            box-shadow: 0 15px 22px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s;
            border: 2px solid #e7cfaa;
        }

        .fraction-card:hover {
            transform: scale(1.01);
        }

        /* 分數 LaTeX 風格 (豎式) */
        .fraction {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 3.6rem;
            font-weight: 600;
            font-family: 'Cambria Math', 'Times New Roman', '微軟正黑體', serif;
            background: #fff4e4;
            padding: 15px 25px;
            border-radius: 55px;
            box-shadow: inset 0 -3px 0 #ddb582, 0 12px 18px rgba(0, 0, 0, 0.1);
        }

        .fraction .numerator {
            display: block;
            text-align: center;
            border-bottom: 3px solid #b97f48;
            padding: 0 12px 8px 12px;
            margin-bottom: 6px;
            font-size: 3rem;
            line-height: 1.2;
        }

        .fraction .denominator {
            display: block;
            text-align: center;
            padding-top: 6px;
            font-size: 3rem;
            line-height: 1.2;
        }

        /* 比較符號按鈕區 */
        .compare-zone {
            background: #f7e5cd;
            border-radius: 100px;
            padding: 22px 20px;
            margin: 20px 0 30px;
            display: flex;
            justify-content: center;
            gap: 35px;
            flex-wrap: wrap;
            box-shadow: inset 0 0 0 3px #fffbf0, 0 8px 18px rgba(0, 0, 0, 0.12);
        }

        .cmp-btn {
            background: #f5b468;
            border: none;
            font-size: 3.2rem;
            font-weight: bold;
            width: 120px;
            padding: 16px 0;
            border-radius: 70px;
            cursor: pointer;
            transition: all 0.1s ease;
            font-family: monospace;
            color: #2d2418;
            box-shadow: 0 7px 0 #9b5e2a;
            letter-spacing: 6px;
        }

        .cmp-btn:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #9b5e2a;
        }

        .cmp-btn:hover {
            background: #ffc285;
            transform: scale(0.98);
        }

        /* 反饋區域：只顯示 ✓ 正確 或 ✗ 錯誤 (含符號) */
        .feedback {
            text-align: center;
            padding: 12px;
            border-radius: 60px;
            font-size: 2rem;
            font-weight: bold;
            margin: 15px 0 10px;
            letter-spacing: 2px;
            transition: 0.1s ease;
            background: #f3e9d8;
            color: #4a3922;
            border-left: 8px solid #e1bc8b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .feedback-correct {
            background: #cbe6c3;
            color: #2c6e2c;
            border-left-color: #5fa04f;
        }

        .feedback-wrong {
            background: #ffdbd1;
            color: #bc4a2e;
            border-left-color: #d65c48;
        }

        .feedback-icon {
            font-size: 2.2rem;
            font-weight: bold;
        }

        /* 視覺圖形區域 */
        .visual-area {
            display: flex;
            justify-content: center;
            gap: 45px;
            margin: 15px 0 5px;
            flex-wrap: wrap;
        }

        .pie-container {
            text-align: center;
            background: #fdf0df;
            padding: 12px 15px;
            border-radius: 50px;
            width: 200px;
            transition: all 0.1s ease;
        }

        /* 正確/錯誤的輔助視覺效果 */
        .correct-flash {
            animation: correctPulse 0.4s ease-in-out 2;
        }

        .wrong-flash {
            animation: wrongShake 0.3s ease-in-out 2;
        }

        @keyframes correctPulse {
            0% { background-color: #fdf0df; box-shadow: 0 0 0 0 #6fbf4c; }
            50% { background-color: #b8e4a0; box-shadow: 0 0 0 8px #6fbf4c; }
            100% { background-color: #fdf0df; box-shadow: 0 0 0 0 #6fbf4c; }
        }

        @keyframes wrongShake {
            0% { transform: translateX(0); background-color: #fdf0df; }
            25% { transform: translateX(-6px); background-color: #ffc2b3; }
            75% { transform: translateX(6px); background-color: #ffc2b3; }
            100% { transform: translateX(0); background-color: #fdf0df; }
        }

        canvas.pie-canvas {
            background: #fae9d4;
            border-radius: 50%;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            width: 150px;
            height: 150px;
            display: block;
            margin: 0 auto;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .next-btn, .reset-btn {
            font-size: 1.4rem;
            padding: 12px 38px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 5px 0 #6f4f2e;
            font-family: '微軟正黑體', sans-serif;
        }

        .next-btn {
            background: #6da55a;
            color: white;
        }

        .reset-btn {
            background: #c08552;
            color: #fff6ea;
        }

        .next-btn:active, .reset-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #5a3e24;
        }

        .disabled-btn {
            opacity: 0.55;
            pointer-events: none;
            transform: none;
        }

        @media (max-width: 700px) {
            .fraction .numerator, .fraction .denominator {
                font-size: 2rem;
            }
            .fraction {
                padding: 10px 18px;
            }
            .cmp-btn {
                width: 85px;
                font-size: 2.2rem;
            }
            .game-container {
                padding: 20px;
            }
            .pie-container {
                width: 160px;
            }
            canvas.pie-canvas {
                width: 120px;
                height: 120px;
            }
            .feedback {
                font-size: 1.5rem;
            }
            .feedback-icon {
                font-size: 1.7rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- 兩個分數區塊 -->
    <div class="fraction-battle">
        <div class="fraction-card">
            <div class="fraction" id="fracLeft">
                <span class="numerator" id="leftNumer">3</span>
                <span class="denominator" id="leftDenom">5</span>
            </div>
        </div>
        <div class="fraction-card">
            <div class="fraction" id="fracRight">
                <span class="numerator" id="rightNumer">2</span>
                <span class="denominator" id="rightDenom">5</span>
            </div>
        </div>
    </div>

    <!-- 圖形區：每個圓形確實分割成「分母」等份，並填滿分子份數，圖案上不顯示分數文字 -->
    <div class="visual-area">
        <div class="pie-container" id="leftPieContainer">
            <canvas id="leftPie" class="pie-canvas" width="300" height="300"></canvas>
        </div>
        <div class="pie-container" id="rightPieContainer">
            <canvas id="rightPie" class="pie-canvas" width="300" height="300"></canvas>
        </div>
    </div>

    <!-- 比較按鈕 -->
    <div class="compare-zone">
        <button class="cmp-btn" data-symbol=">"> &gt; </button>
        <button class="cmp-btn" data-symbol="<"> &lt; </button>
        <button class="cmp-btn" data-symbol="="> = </button>
    </div>

    <!-- 反饋區域：顯示 ✓ 正確 或 ✗ 錯誤 (含符號) -->
    <div class="feedback" id="feedbackMsg"></div>

    <div class="action-buttons">
        <button class="reset-btn" id="resetGameBtn">⟳ 新的一輪</button>
        <button class="next-btn" id="nextQuestionBtn">下一組 ↺</button>
    </div>
</div>

<script>
    // ---------- 遊戲狀態 ----------
    let leftNumer = 3, leftDenom = 5;
    let rightNumer = 2, rightDenom = 5;
    let answered = false;
    let currentCorrectRelation = '';

    // DOM 元素
    const leftNumerSpan = document.getElementById('leftNumer');
    const leftDenomSpan = document.getElementById('leftDenom');
    const rightNumerSpan = document.getElementById('rightNumer');
    const rightDenomSpan = document.getElementById('rightDenom');
    const nextBtn = document.getElementById('nextQuestionBtn');
    const resetBtn = document.getElementById('resetGameBtn');
    const cmpBtns = document.querySelectorAll('.cmp-btn');
    const leftPieContainer = document.getElementById('leftPieContainer');
    const rightPieContainer = document.getElementById('rightPieContainer');
    const feedbackDiv = document.getElementById('feedbackMsg');
    
    const leftCanvas = document.getElementById('leftPie');
    const rightCanvas = document.getElementById('rightPie');
    let leftCtx = leftCanvas.getContext('2d');
    let rightCtx = rightCanvas.getContext('2d');

    // 顯示文字反饋 (符號 + 正確/錯誤)
    function setFeedback(isCorrect) {
        if (isCorrect) {
            feedbackDiv.innerHTML = '<span class="feedback-icon">✓</span> 正確';
            feedbackDiv.classList.remove('feedback-wrong');
            feedbackDiv.classList.add('feedback-correct');
        } else {
            feedbackDiv.innerHTML = '<span class="feedback-icon">✗</span> 錯誤';
            feedbackDiv.classList.remove('feedback-correct');
            feedbackDiv.classList.add('feedback-wrong');
        }
    }
    
    function clearFeedback() {
        feedbackDiv.innerHTML = '';
        feedbackDiv.classList.remove('feedback-correct', 'feedback-wrong');
    }

    // 輔助視覺效果 (圖形閃爍)
    function showCorrectVisual() {
        leftPieContainer.classList.add('correct-flash');
        rightPieContainer.classList.add('correct-flash');
        setTimeout(() => {
            leftPieContainer.classList.remove('correct-flash');
            rightPieContainer.classList.remove('correct-flash');
        }, 500);
    }

    function showWrongVisual() {
        leftPieContainer.classList.add('wrong-flash');
        rightPieContainer.classList.add('wrong-flash');
        setTimeout(() => {
            leftPieContainer.classList.remove('wrong-flash');
            rightPieContainer.classList.remove('wrong-flash');
        }, 500);
    }

    // ---------- 核心繪圖函數：將圓形確實分割成 denominator 等份，並填滿 numerator 份，不繪製任何分數文字 ----------
    function drawPieWithDivisions(ctx, numerator, denominator) {
        if (denominator <= 0) denominator = 1;
        if (numerator < 0) numerator = 0;
        if (numerator > denominator) numerator = denominator;
        
        const w = ctx.canvas.width;
        const h = ctx.canvas.height;
        const centerX = w / 2;
        const centerY = h / 2;
        const radius = Math.min(w, h) * 0.4;
        
        ctx.clearRect(0, 0, w, h);
        
        // 1. 背景底色 (淺米色)
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
        ctx.fillStyle = "#f7e5cd";
        ctx.fill();
        ctx.strokeStyle = "#b87a3c";
        ctx.lineWidth = 2.2;
        ctx.stroke();
        
        if (denominator === 0) return;
        
        const angleStep = (2 * Math.PI) / denominator;
        const startAngle = -Math.PI / 2; // 從頂部開始
        
        // 2. 先繪製等份分割線 (從圓心到圓周)
        for (let i = 0; i < denominator; i++) {
            const angle = startAngle + i * angleStep;
            const x2 = centerX + radius * Math.cos(angle);
            const y2 = centerY + radius * Math.sin(angle);
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = "#c28a4e";
            ctx.lineWidth = 1.8;
            ctx.stroke();
        }
        
        // 3. 填滿「分子」份的扇形區塊
        if (numerator > 0) {
            const fillAngle = numerator * angleStep;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, startAngle, startAngle + fillAngle);
            ctx.closePath();
            ctx.fillStyle = "#f0a35e";
            ctx.fill();
            
            // 重新描一次外框與分割線，讓邊界更清楚
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = "#b87a3c";
            ctx.lineWidth = 2.2;
            ctx.stroke();
            
            // 再次繪製所有分割線 (確保填色後分割線依然明顯)
            for (let i = 0; i < denominator; i++) {
                const angle = startAngle + i * angleStep;
                const x2 = centerX + radius * Math.cos(angle);
                const y2 = centerY + radius * Math.sin(angle);
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = "#a5682c";
                ctx.lineWidth = 1.8;
                ctx.stroke();
            }
        } else {
            // 分子為0：不填色，但分割線依然顯示完整圓形被等分
            for (let i = 0; i < denominator; i++) {
                const angle = startAngle + i * angleStep;
                const x2 = centerX + radius * Math.cos(angle);
                const y2 = centerY + radius * Math.sin(angle);
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = "#a5682c";
                ctx.lineWidth = 1.8;
                ctx.stroke();
            }
        }
        
        // 若分子等於分母，整個圓填滿並強化分割線
        if (numerator === denominator && denominator > 0) {
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.fillStyle = "#f0a35e";
            ctx.fill();
            // 再補上分割線
            for (let i = 0; i < denominator; i++) {
                const angle = startAngle + i * angleStep;
                const x2 = centerX + radius * Math.cos(angle);
                const y2 = centerY + radius * Math.sin(angle);
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = "#9b5e2a";
                ctx.stroke();
            }
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = "#9b5e2a";
            ctx.stroke();
        }
        
        // 最外圍加強邊框
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
        ctx.strokeStyle = "#7a532c";
        ctx.lineWidth = 2.5;
        ctx.stroke();
        
        // 不繪製任何分數文字
    }
    
    function updateBothPies() {
        drawPieWithDivisions(leftCtx, leftNumer, leftDenom);
        drawPieWithDivisions(rightCtx, rightNumer, rightDenom);
    }

    // 生成隨機同分母分數 (分母 2~10，分子介於 0~分母)
    function generateRandomFractionPair() {
        const denominator = Math.floor(Math.random() * 9) + 2; // 2 ~ 10
        let numerator1 = Math.floor(Math.random() * (denominator + 1));
        let numerator2 = Math.floor(Math.random() * (denominator + 1));
        if (numerator1 === 0 && numerator2 === 0 && denominator > 1) {
            numerator2 = 1;
        }
        return {
            leftNum: numerator1,
            leftDen: denominator,
            rightNum: numerator2,
            rightDen: denominator
        };
    }
    
    function getCorrectRelation(num1, num2) {
        if (num1 > num2) return '>';
        if (num1 < num2) return '<';
        return '=';
    }
    
    // 載入新題目
    function loadNewQuestion() {
        answered = false;
        let { leftNum, leftDen, rightNum, rightDen } = generateRandomFractionPair();
        leftNumer = leftNum;
        leftDenom = leftDen;
        rightNumer = rightNum;
        rightDenom = rightDen;
        
        leftNumerSpan.innerText = leftNumer;
        leftDenomSpan.innerText = leftDenom;
        rightNumerSpan.innerText = rightNumer;
        rightDenomSpan.innerText = rightDenom;
        
        currentCorrectRelation = getCorrectRelation(leftNumer, rightNumer);
        updateBothPies();
        
        clearFeedback();
        
        cmpBtns.forEach(btn => {
            btn.disabled = false;
            btn.style.opacity = "1";
            btn.style.pointerEvents = "auto";
        });
        
        nextBtn.disabled = true;
        nextBtn.classList.add("disabled-btn");
    }
    
    // 處理比較：顯示「✓ 正確」或「✗ 錯誤」，加上視覺效果，不顯示答案
    function handleCompare(selectedSymbol) {
        if (answered) return;
        
        const isCorrect = (selectedSymbol === currentCorrectRelation);
        if (isCorrect) {
            setFeedback(true);
            showCorrectVisual();
            answered = true;
            cmpBtns.forEach(btn => {
                btn.disabled = true;
                btn.style.opacity = "0.6";
                btn.style.pointerEvents = "none";
            });
            nextBtn.disabled = false;
            nextBtn.classList.remove("disabled-btn");
        } else {
            setFeedback(false);
            showWrongVisual();
            // 保持按鈕可點選，讓學生繼續嘗試，但不顯示答案內容
            return;
        }
    }
    
    function nextQuestion() {
        if (!answered) {
            return;
        }
        loadNewQuestion();
        nextBtn.disabled = true;
        nextBtn.classList.add("disabled-btn");
        cmpBtns.forEach(btn => {
            btn.disabled = false;
            btn.style.opacity = "1";
            btn.style.pointerEvents = "auto";
        });
    }
    
    function resetGame() {
        let { leftNum, leftDen, rightNum, rightDen } = generateRandomFractionPair();
        leftNumer = leftNum;
        leftDenom = leftDen;
        rightNumer = rightNum;
        rightDenom = rightDen;
        leftNumerSpan.innerText = leftNumer;
        leftDenomSpan.innerText = leftDenom;
        rightNumerSpan.innerText = rightNumer;
        rightDenomSpan.innerText = rightDenom;
        currentCorrectRelation = getCorrectRelation(leftNumer, rightNumer);
        updateBothPies();
        
        answered = false;
        clearFeedback();
        cmpBtns.forEach(btn => {
            btn.disabled = false;
            btn.style.opacity = "1";
            btn.style.pointerEvents = "auto";
        });
        nextBtn.disabled = true;
        nextBtn.classList.add("disabled-btn");
    }
    
    function bindEvents() {
        cmpBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const symbol = btn.getAttribute('data-symbol');
                handleCompare(symbol);
            });
        });
        nextBtn.addEventListener('click', nextQuestion);
        resetBtn.addEventListener('click', resetGame);
    }
    
    function init() {
        bindEvents();
        let { leftNum, leftDen, rightNum, rightDen } = generateRandomFractionPair();
        leftNumer = leftNum;
        leftDenom = leftDen;
        rightNumer = rightNum;
        rightDenom = rightDen;
        leftNumerSpan.innerText = leftNumer;
        leftDenomSpan.innerText = leftDenom;
        rightNumerSpan.innerText = rightNumer;
        rightDenomSpan.innerText = rightDenom;
        currentCorrectRelation = getCorrectRelation(leftNumer, rightNumer);
        updateBothPies();
        answered = false;
        clearFeedback();
        nextBtn.disabled = true;
        nextBtn.classList.add("disabled-btn");
    }
    
    init();
</script>
</body>
</html>
