<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>同分子分數比較遊戲｜圓形實線等分｜重疊比較區</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #eef2f8 0%, #dce5ef 100%);
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans CJK TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
        }

        .game-container {
            background: rgba(255, 255, 245, 0.92);
            backdrop-filter: blur(3px);
            border-radius: 64px;
            padding: 28px 32px 38px 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
            border: 1px solid #fff3e0;
            max-width: 1300px;
            width: 100%;
        }

        /* 三區塊平排: 左圖 | 答案區(> < 可點選) | 右圖 */
        .three-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: stretch;
            gap: 28px;
            margin-bottom: 40px;
        }

        .shape-card {
            flex: 1;
            min-width: 270px;
            background: #fffdf8f2;
            backdrop-filter: blur(2px);
            border-radius: 56px;
            padding: 20px 20px 28px 20px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.06);
            text-align: center;
            border: 1px solid #ffe2bf;
        }

        .fraction-latex {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fffcf2dd;
            padding: 12px 28px;
            border-radius: 60px;
            margin: 8px 0 12px 0;
            box-shadow: inset 0 1px 3px #0001, 0 6px 12px rgba(0, 0, 0, 0.04);
        }
        .fraction-num {
            font-size: 2.2rem;
            font-weight: 800;
            font-family: 'Courier New', '等線', monospace;
            color: #1a4b6e;
            line-height: 1.2;
        }
        .fraction-line {
            width: 65px;
            height: 3.5px;
            background: #2f6285;
            margin: 6px 0;
            border-radius: 3px;
        }
        .fraction-den {
            font-size: 2.2rem;
            font-weight: 800;
            font-family: 'Courier New', '等線', monospace;
            color: #1a4b6e;
            line-height: 1.2;
        }

        .shape-drag-area {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 12px 0;
            min-height: 280px;
            background: #fef7ede6;
            border-radius: 52px;
            padding: 12px;
            cursor: grab;
            transition: 0.05s linear;
        }
        .shape-drag-area:active {
            cursor: grabbing;
        }

        svg {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.08));
        }

        /* 中間答案區塊 (大於小於選擇 + 核對) */
        .answer-card {
            flex: 0.5;
            min-width: 180px;
            background: #fffef7;
            border-radius: 64px;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.08);
            border: 2px solid #cfdec9;
        }
        .answer-input-area {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .compare-option {
            font-size: 3rem;
            font-weight: 800;
            font-family: monospace;
            background: #eef2f0;
            width: 90px;
            height: 90px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
            color: #2c5a74;
            border: 2px solid transparent;
        }
        .compare-option.selected {
            background: #ffe0a3;
            border: 3px solid #e68a2e;
            color: #b45f1b;
            transform: scale(1.02);
            box-shadow: 0 5px 12px rgba(0,0,0,0.15);
        }
        .compare-option:hover {
            background: #f3d9b0;
            transform: scale(1.02);
        }
        .check-btn {
            background: #7fae7a;
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 8px 28px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            margin-bottom: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .check-btn:hover {
            background: #5f8e5a;
            transform: scale(0.96);
        }
        .result-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .result-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.4rem;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 60px;
            background: #f9f5ea;
            box-shadow: inset 0 1px 2px #0001, 0 2px 5px rgba(0,0,0,0.05);
        }
        .result-correct {
            color: #2c7a3e;
            background: #e0f2e0dd;
        }
        .result-wrong {
            color: #bc5a3c;
            background: #ffe6e0dd;
        }
        .result-symbol {
            font-size: 1.6rem;
            font-weight: 800;
        }

        /* 下方拖曳比較區 - 重疊擺放 (單一容器內兩個SVG疊加) */
        .comparison-area {
            margin-top: 30px;
            background: #fcf8efe6;
            backdrop-filter: blur(8px);
            border-radius: 64px;
            padding: 20px 20px 28px;
            border: 2px dashed #b6cfb0;
            text-align: center;
        }
        .overlap-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .overlap-container {
            position: relative;
            width: 280px;
            height: 260px;
            margin: 10px auto;
            border-radius: 48px;
            background: #f5efe2cc;
            box-shadow: inset 0 0 0 2px #fff8e7, 0 8px 20px rgba(0,0,0,0.1);
            overflow: visible;
        }
        .compare-svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: transparent;
        }

        /* 控制按鈕列 */
        .ctrl-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 35px;
            flex-wrap: wrap;
        }
        .ctrl-btn {
            background: #f3e5cd;
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 10px 32px;
            border-radius: 48px;
            cursor: pointer;
            transition: 0.2s;
            color: #3d3a2b;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .ctrl-btn.primary {
            background: #ffdead;
            color: #4a3a24;
        }
        .ctrl-btn:hover {
            background: #ffd29e;
            transform: scale(0.97);
        }

        @media (max-width: 980px) {
            .three-panel { flex-direction: column; align-items: center; }
            .overlap-container { width: 240px; height: 220px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- 上排：左圖案 | 答案區(> < 可點選 + 核對按鈕) | 右圖案 -->
    <div class="three-panel">
        <!-- 左側圖形 -->
        <div class="shape-card">
            <div class="fraction-latex">
                <span class="fraction-num" id="leftNum">3</span>
                <div class="fraction-line"></div>
                <span class="fraction-den" id="leftDen">4</span>
            </div>
            <div class="shape-drag-area" id="dragLeftSource" draggable="true">
                <svg id="leftMainSVG" width="260" height="240" viewBox="0 0 260 240"></svg>
            </div>
        </div>

        <!-- 中間答案區塊 (選擇大於小於 + 核對，結果顯示正確/錯誤 + 前置符號) -->
        <div class="answer-card">
            <div class="answer-input-area">
                <div class="compare-option" data-symbol=">">></div>
                <div class="compare-option" data-symbol="<"><</div>
            </div>
            <button class="check-btn" id="checkAnswerBtn">✓ 核對答案</button>
            <div class="result-area" id="resultArea">
                <!-- 動態顯示正確/錯誤，符號在前 -->
            </div>
        </div>

        <!-- 右側圖形 -->
        <div class="shape-card">
            <div class="fraction-latex">
                <span class="fraction-num" id="rightNum">3</span>
                <div class="fraction-line"></div>
                <span class="fraction-den" id="rightDen">6</span>
            </div>
            <div class="shape-drag-area" id="dragRightSource" draggable="true">
                <svg id="rightMainSVG" width="260" height="240" viewBox="0 0 260 240"></svg>
            </div>
        </div>
    </div>

    <!-- 下方拖曳比較區：重疊擺放（無任何提示文字） -->
    <div class="comparison-area">
        <div class="overlap-wrapper">
            <div class="overlap-container" id="overlapContainer">
                <svg id="compareLeftLayer" class="compare-svg-layer" width="280" height="260" viewBox="0 0 280 260"></svg>
                <svg id="compareRightLayer" class="compare-svg-layer" width="280" height="260" viewBox="0 0 280 260"></svg>
            </div>
        </div>
    </div>

    <!-- 控制區: 重設 (↻ 符號) / 新題目 -->
    <div class="ctrl-bar">
        <button class="ctrl-btn primary" id="resetBtn">↻ 重設</button>
        <button class="ctrl-btn" id="generateRandomBtn">🎲 新題目</button>
    </div>
</div>

<script>
    // ---------- 輔助函數：確保真分數 (分子 < 分母) ----------
    function enforceProperFraction(num, den) {
        if (den < 2) den = 2;
        if (num >= den) num = den - 1;
        if (num < 1) num = 1;
        return { num, den };
    }

    // ---------- 繪圖核心：圓形 + 實線等分線 (分母切成幾份就畫幾條實線) ----------
    function drawCircleWithLines(svgElement, fraction, width, height, colorTone) {
        svgElement.innerHTML = '';
        svgElement.setAttribute('width', width);
        svgElement.setAttribute('height', height);
        svgElement.setAttribute('viewBox', `0 0 ${width} ${height}`);
        
        let { num, den } = fraction;
        if (den <= 0) den = 1;
        if (num > den) num = den;
        const ratio = Math.min(1, num / den);
        const cx = width / 2;
        const cy = height / 2;
        const radius = Math.min(width, height) * 0.36;
        
        // 背景半透明圓
        const bgCircle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        bgCircle.setAttribute('cx', cx);
        bgCircle.setAttribute('cy', cy);
        bgCircle.setAttribute('r', radius);
        bgCircle.setAttribute('fill', '#d9e3ed');
        bgCircle.setAttribute('fill-opacity', '0.28');
        bgCircle.setAttribute('stroke', '#6d8eae');
        bgCircle.setAttribute('stroke-width', '2');
        bgCircle.setAttribute('stroke-opacity', '0.7');
        svgElement.appendChild(bgCircle);
        
        // 扇形填充分數區域 (高透明度方便疊加)
        if (ratio > 0) {
            const startAngle = -Math.PI / 2;
            const endAngle = startAngle + (ratio * 2 * Math.PI);
            const startX = cx + radius * Math.cos(startAngle);
            const startY = cy + radius * Math.sin(startAngle);
            const endX = cx + radius * Math.cos(endAngle);
            const endY = cy + radius * Math.sin(endAngle);
            const largeArc = ratio > 0.5 ? 1 : 0;
            const pathData = `M ${cx} ${cy} L ${startX} ${startY} A ${radius} ${radius} 0 ${largeArc} 1 ${endX} ${endY} Z`;
            const slice = document.createElementNS("http://www.w3.org/2000/svg", "path");
            slice.setAttribute('d', pathData);
            const fillColor = (colorTone === 'blue') ? '#3f8db3' : '#e0924b';
            slice.setAttribute('fill', fillColor);
            slice.setAttribute('fill-opacity', '0.78');
            slice.setAttribute('stroke', '#2d5a74');
            slice.setAttribute('stroke-width', '1.5');
            svgElement.appendChild(slice);
        }
        
        // 繪製等分實線 (根據分母，從圓心到圓周，實線)
        const angleStep = (2 * Math.PI) / den;
        for (let i = 0; i < den; i++) {
            const angle = -Math.PI / 2 + i * angleStep;
            const lineEndX = cx + radius * Math.cos(angle);
            const lineEndY = cy + radius * Math.sin(angle);
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute('x1', cx);
            line.setAttribute('y1', cy);
            line.setAttribute('x2', lineEndX);
            line.setAttribute('y2', lineEndY);
            line.setAttribute('stroke', '#2f5f82');
            line.setAttribute('stroke-width', '2.2');
            line.setAttribute('stroke-dasharray', 'none');
            line.setAttribute('stroke-opacity', '0.9');
            svgElement.appendChild(line);
        }
        
        // 外框實線
        const borderCircle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        borderCircle.setAttribute('cx', cx);
        borderCircle.setAttribute('cy', cy);
        borderCircle.setAttribute('r', radius);
        borderCircle.setAttribute('fill', 'none');
        borderCircle.setAttribute('stroke', '#2d5f7e');
        borderCircle.setAttribute('stroke-width', '2.5');
        borderCircle.setAttribute('stroke-opacity', '0.85');
        svgElement.appendChild(borderCircle);
    }

    // ---------- 遊戲狀態 ----------
    // 當前顯示的分數 (真分數)
    let leftFraction = { num: 3, den: 4 };
    let rightFraction = { num: 3, den: 6 };
    
    // 備份：記錄「目前題型」的原始分數 (用於重設回目前題型，而非回到程式預設)
    let backupLeft = { num: 3, den: 4 };
    let backupRight = { num: 3, den: 6 };
    
    // DOM 元素
    const leftMainSVG = document.getElementById('leftMainSVG');
    const rightMainSVG = document.getElementById('rightMainSVG');
    const leftNumSpan = document.getElementById('leftNum');
    const leftDenSpan = document.getElementById('leftDen');
    const rightNumSpan = document.getElementById('rightNum');
    const rightDenSpan = document.getElementById('rightDen');
    
    // 重疊比較區圖層
    const compareLeftLayer = document.getElementById('compareLeftLayer');
    const compareRightLayer = document.getElementById('compareRightLayer');
    
    // 答案相關
    const compareOptions = document.querySelectorAll('.compare-option');
    const checkBtn = document.getElementById('checkAnswerBtn');
    const resultArea = document.getElementById('resultArea');
    let selectedSymbol = null;   // '>' 或 '<'
    
    // 儲存比較區內左右圖形資料 (重疊區)
    let leftOverlapFrac = null;
    let rightOverlapFrac = null;
    let leftOverlapColor = 'blue';
    let rightOverlapColor = 'orange';
    
    // 刷新左右主圖形 & 分數顯示
    function refreshMainShapes() {
        leftNumSpan.innerText = leftFraction.num;
        leftDenSpan.innerText = leftFraction.den;
        rightNumSpan.innerText = rightFraction.num;
        rightDenSpan.innerText = rightFraction.den;
        
        drawCircleWithLines(leftMainSVG, leftFraction, 260, 240, 'blue');
        drawCircleWithLines(rightMainSVG, rightFraction, 260, 240, 'orange');
        
        // 同步重疊區圖形 (如果有資料)
        if (leftOverlapFrac) {
            drawCircleWithLines(compareLeftLayer, leftOverlapFrac, 280, 260, leftOverlapColor);
        } else {
            compareLeftLayer.innerHTML = '';
        }
        if (rightOverlapFrac) {
            drawCircleWithLines(compareRightLayer, rightOverlapFrac, 280, 260, rightOverlapColor);
        } else {
            compareRightLayer.innerHTML = '';
        }
    }
    
    // 重疊比較區完全清除
    function resetOverlapZone() {
        leftOverlapFrac = null;
        rightOverlapFrac = null;
        compareLeftLayer.innerHTML = '';
        compareRightLayer.innerHTML = '';
    }
    
    // 強制左右分數皆為真分數 (分子 < 分母)
    function sanitizeFractions() {
        let left = enforceProperFraction(leftFraction.num, leftFraction.den);
        let right = enforceProperFraction(rightFraction.num, rightFraction.den);
        leftFraction = left;
        rightFraction = right;
    }
    
    // 更新備份 = 目前顯示的題目 (當「新題目」產生後呼叫)
    function updateBackupFromCurrent() {
        backupLeft = { num: leftFraction.num, den: leftFraction.den };
        backupRight = { num: rightFraction.num, den: rightFraction.den };
    }
    
    // 重設：回到「目前題型」的原始狀態 (也就是 backup 的值，而不是一開始的 3/4 3/6)
    function resetToCurrentTopic() {
        // 恢復備份的分數
        leftFraction = { num: backupLeft.num, den: backupLeft.den };
        rightFraction = { num: backupRight.num, den: backupRight.den };
        sanitizeFractions();      // 再次確保真分數
        refreshMainShapes();
        resetOverlapZone();
        // 清空答案選擇與結果
        selectedSymbol = null;
        compareOptions.forEach(opt => opt.classList.remove('selected'));
        clearResult();
    }
    
    // 顯示結果 (符號在前 + 正確/錯誤文字)
    function displayResult(isCorrect) {
        resultArea.innerHTML = '';
        const badge = document.createElement('div');
        badge.className = 'result-badge';
        if (isCorrect) {
            badge.classList.add('result-correct');
            badge.innerHTML = '<span class="result-symbol">✔</span> <span>正確</span>';
        } else {
            badge.classList.add('result-wrong');
            badge.innerHTML = '<span class="result-symbol">✘</span> <span>錯誤</span>';
        }
        resultArea.appendChild(badge);
    }
    
    // 清除結果顯示
    function clearResult() {
        resultArea.innerHTML = '';
    }
    
    // 自動生成其他範例 (同分子，分母不同，且皆為真分數)
    // 產生後會自動更新備份，讓「重設」回到新題目的初始狀態
    function generateRandomExample() {
        let sameNum = Math.floor(Math.random() * 8) + 2; // 分子 2~9
        let den1 = Math.floor(Math.random() * 8) + 2;   // 分母至少2
        let den2 = Math.floor(Math.random() * 8) + 2;
        while (den1 === den2) {
            den2 = Math.floor(Math.random() * 8) + 2;
        }
        // 確保真分數: 分子必須小於分母
        if (sameNum >= den1) sameNum = den1 - 1;
        if (sameNum < 1) sameNum = 1;
        let finalNum = sameNum;
        if (finalNum >= den2) finalNum = den2 - 1;
        if (finalNum < 1) finalNum = 1;
        
        leftFraction = { num: finalNum, den: Math.min(den1, 12) };
        rightFraction = { num: finalNum, den: Math.min(den2, 12) };
        // 二次確保真分數
        leftFraction = enforceProperFraction(leftFraction.num, leftFraction.den);
        rightFraction = enforceProperFraction(rightFraction.num, rightFraction.den);
        // 確保分子相同
        const commonNum = Math.min(leftFraction.num, rightFraction.num);
        leftFraction.num = commonNum;
        rightFraction.num = commonNum;
        if (leftFraction.num >= leftFraction.den) leftFraction.num = leftFraction.den - 1;
        if (rightFraction.num >= rightFraction.den) rightFraction.num = rightFraction.den - 1;
        if (leftFraction.num < 1) leftFraction.num = 1;
        if (rightFraction.num < 1) rightFraction.num = 1;
        
        // 更新備份，使「重設」回到這個新題目
        updateBackupFromCurrent();
        
        refreshMainShapes();
        resetOverlapZone();
        // 重設答案選擇與結果
        selectedSymbol = null;
        compareOptions.forEach(opt => opt.classList.remove('selected'));
        clearResult();
    }
    
    // 核對答案：顯示正確/錯誤 + 前置符號
    function checkAnswer() {
        if (!selectedSymbol) {
            clearResult();
            return;
        }
        const leftVal = leftFraction.num / leftFraction.den;
        const rightVal = rightFraction.num / rightFraction.den;
        let correctSymbol = '';
        if (Math.abs(leftVal - rightVal) < 0.000001) correctSymbol = '=';
        else if (leftVal > rightVal) correctSymbol = '>';
        else correctSymbol = '<';
        
        if (correctSymbol === '=') {
            // 真分數同分子不會相等，但預防萬一，顯示錯誤（因為沒有等號選項）
            displayResult(false);
        } else if (selectedSymbol === correctSymbol) {
            displayResult(true);
        } else {
            displayResult(false);
        }
    }
    
    // 拖曳系統: 左右主圖形可拖曳到下方重疊區 (單一重疊區，分別設定左右圖層)
    function initDragAndDrop() {
        const leftDragSource = document.getElementById('dragLeftSource');
        const rightDragSource = document.getElementById('dragRightSource');
        const overlapContainer = document.getElementById('overlapContainer');
        
        leftDragSource.setAttribute('draggable', 'true');
        rightDragSource.setAttribute('draggable', 'true');
        
        leftDragSource.addEventListener('dragstart', (e) => {
            const payload = { side: 'left', fraction: { ...leftFraction }, color: 'blue' };
            e.dataTransfer.setData('text/plain', JSON.stringify(payload));
            e.dataTransfer.effectAllowed = 'copy';
            const ghost = document.createElement('div');
            ghost.style.opacity = '0';
            document.body.appendChild(ghost);
            e.dataTransfer.setDragImage(ghost, 0, 0);
            setTimeout(() => document.body.removeChild(ghost), 0);
        });
        
        rightDragSource.addEventListener('dragstart', (e) => {
            const payload = { side: 'right', fraction: { ...rightFraction }, color: 'orange' };
            e.dataTransfer.setData('text/plain', JSON.stringify(payload));
            e.dataTransfer.effectAllowed = 'copy';
            const ghost = document.createElement('div');
            ghost.style.opacity = '0';
            document.body.appendChild(ghost);
            e.dataTransfer.setDragImage(ghost, 0, 0);
            setTimeout(() => document.body.removeChild(ghost), 0);
        });
        
        overlapContainer.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
        });
        
        overlapContainer.addEventListener('drop', (e) => {
            e.preventDefault();
            const raw = e.dataTransfer.getData('text/plain');
            if (!raw) return;
            const data = JSON.parse(raw);
            const { side, fraction, color } = data;
            if (side === 'left') {
                leftOverlapFrac = { num: fraction.num, den: fraction.den };
                leftOverlapColor = color;
                drawCircleWithLines(compareLeftLayer, leftOverlapFrac, 280, 260, leftOverlapColor);
            } else if (side === 'right') {
                rightOverlapFrac = { num: fraction.num, den: fraction.den };
                rightOverlapColor = color;
                drawCircleWithLines(compareRightLayer, rightOverlapFrac, 280, 260, rightOverlapColor);
            }
        });
    }
    
    // 選取符號事件
    compareOptions.forEach(opt => {
        opt.addEventListener('click', () => {
            compareOptions.forEach(o => o.classList.remove('selected'));
            opt.classList.add('selected');
            selectedSymbol = opt.getAttribute('data-symbol');
            // 選取新符號後清除上次核對結果
            clearResult();
        });
    });
    
    // 綁定事件
    checkBtn.addEventListener('click', checkAnswer);
    document.getElementById('resetBtn').addEventListener('click', resetToCurrentTopic);
    document.getElementById('generateRandomBtn').addEventListener('click', generateRandomExample);
    
    // 初始化
    function init() {
        initDragAndDrop();
        // 設定起始題目 (3/4 , 3/6) 並同時更新備份，使重設一開始也是回到此題
        leftFraction = { num: 3, den: 4 };
        rightFraction = { num: 3, den: 6 };
        sanitizeFractions();
        updateBackupFromCurrent();   // 備份 = 預設題目
        refreshMainShapes();
        resetOverlapZone();
        selectedSymbol = null;
        compareOptions.forEach(opt => opt.classList.remove('selected'));
        clearResult();
    }
    init();
</script>
</body>
</html>
